<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Allo Secours vous aide a trouver rapidement des services de sante et d'urgence au Benin.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1565C0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="allo_secours">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Allo Secours</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: linear-gradient(180deg, #eef5ff 0%, #f7fbff 100%);
      font-family: Arial, sans-serif;
    }

    body {
      overflow: hidden;
    }

    #app-loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, rgba(21, 101, 192, 0.14), transparent 40%),
        linear-gradient(180deg, #eef5ff 0%, #f7fbff 100%);
      transition: opacity 220ms ease, visibility 220ms ease;
      z-index: 9999;
    }

    #app-loader.loader-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-card {
      width: min(88vw, 320px);
      padding: 28px 24px;
      border-radius: 24px;
      text-align: center;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 20px 45px rgba(21, 101, 192, 0.12);
      backdrop-filter: blur(10px);
    }

    .loader-icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 18px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      color: #ffffff;
      font-size: 36px;
      background: linear-gradient(135deg, #1565c0, #1e88e5);
      box-shadow: 0 14px 28px rgba(21, 101, 192, 0.24);
    }

    .loader-title {
      margin: 0;
      color: #0f2747;
      font-size: 24px;
      font-weight: 700;
    }

    .loader-text {
      margin: 10px 0 18px;
      color: #4f647d;
      font-size: 14px;
      line-height: 1.5;
    }

    .loader-bar {
      height: 6px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(21, 101, 192, 0.12);
    }

    .loader-bar::after {
      content: "";
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #1565c0, #64b5f6);
      animation: loader-slide 1.1s ease-in-out infinite;
    }

    @keyframes loader-slide {
      0% {
        transform: translateX(-120%);
      }
      100% {
        transform: translateX(260%);
      }
    }
  </style>
</head>

<body>
  <div id="app-loader" aria-live="polite">
    <div class="loader-card">
      <div class="loader-icon">+</div>
      <h1 class="loader-title">Allo Secours</h1>
      <p class="loader-text">Chargement rapide de votre espace sante...</p>
      <div class="loader-bar"></div>
    </div>
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
